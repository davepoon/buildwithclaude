# project-boundary — path allowlist
#
# Paths matching ANY pattern below bypass the boundary check and may be
# written/edited/redirected-to even when they live outside the project dir.
#
# Format:
#   - one glob pattern per line
#   - `#` starts a comment (full-line or trailing)
#   - blank lines ignored
#   - `~` at the start expands to $HOME
#   - `**` matches any number of path segments (bash globstar)
#   - `*`  matches within a single segment
#
# ───────────────────────────────────────────────────────────────────────────
# WARNING — DO NOT mass-add entries here.
# ───────────────────────────────────────────────────────────────────────────
# Every allowlist entry is an escape hatch from the boundary. Claude is
# creative and, given a broad allowlist, will find non-obvious workarounds:
#   - symlink-chasing THROUGH an allowlisted dir into sensitive paths
#   - writing files that other tools later `source`/execute
#   - clobbering config (settings.json, shell rc) if you widen to `~/.claude/**`
#   - staging payloads in an allowed dir, then moving them elsewhere
# Each entry should be narrow, purpose-specific, and justified in a comment.
# Prefer asking Claude for explicit per-write permission over widening this.
# ───────────────────────────────────────────────────────────────────────────

# Claude Code auto-memory: persistent notes about user, project, feedback.
# Lives outside any single project on purpose (cross-session persistence).
~/.claude/projects/*/memory/**
